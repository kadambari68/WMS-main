<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Packing Lifecycle Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      padding: 20px;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #4D2FB2, #1a1a2e);
      color: #fff;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 25px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
    }

    .header h1 {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .header p {
      opacity: 0.9;
      font-size: 16px;
    }

    /* ── Controls row ── */
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      background: #4D2FB2;
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn:hover {
      background: #1a1a2e;
      transform: translateY(-2px);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid #4D2FB2;
      color: #4D2FB2;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 11px;
    }

    /* ── Search bar ── */
    .search-wrap {
      flex: 1;
      min-width: 200px;
      max-width: 400px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      padding: 11px 12px 11px 38px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      transition: border-color 0.2s;
      outline: none;
    }

    #searchInput:focus {
      border-color: #667eea;
    }

    /* ── Filter Toggles ── */
    .filters {
      display: flex;
      gap: 15px;
      align-items: center;
      background: rgba(255, 255, 255, 0.5);
      padding: 10px 15px;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .filter-opt {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ── Result count ── */
    .result-meta {
      font-size: 13px;
      color: #666;
      margin-bottom: 16px;
      min-height: 20px;
    }

    /* ── Cards ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 25px;
    }

    details.item-card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      position: relative;
    }

    details.item-card summary {
      font-weight: 700;
      cursor: pointer;
      list-style: none;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .summary-copy {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .item-desc {
      font-size: 12px;
      font-weight: 500;
      color: #6b7280;
    }

    .pill {
      background: #f8f9fa;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      color: #333;
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      margin-right: 4px;
      text-transform: uppercase;
    }

    .badge-latest {
      background: #10B981;
    }

    .badge-obsolete {
      background: #6B7280;
      opacity: 0.7;
    }

    .bins {
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }

    .bin-row {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
      font-size: 13px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }

    .bin-row.is-latest {
      background: #ecfdf5;
      border-color: #10B981;
    }

    .bin-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .bin-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .bin-code {
      font-weight: 700;
      color: #111;
    }

    .bin-meta {
      font-size: 11px;
      color: #666;
    }

    .bin-qty {
      font-weight: 800;
      font-size: 14px;
      color: #111;
    }

    .bin-reason {
      font-size: 11px;
      color: #047857;
      font-style: italic;
      margin-top: 4px;
      padding-top: 4px;
      border-top: 1px dashed rgba(16, 185, 129, 0.3);
    }

    .bin-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: #999;
      grid-column: 1 / -1;
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    }

    .modal h3 {
      margin-bottom: 15px;
      font-size: 18px;
    }

    .modal label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 600;
    }

    .modal input,
    .modal textarea {
      width: 100%;
      padding: 10px;
      border: 2px solid #eee;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      margin-bottom: 14px;
    }

    .modal textarea {
      margin-bottom: 20px;
      resize: vertical;
      min-height: 80px;
    }

    .modal-btns {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* Highlight */
    mark {
      background: #e8ecff;
      color: #3730a3;
      padding: 0 2px;
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>Packing Lifecycle</h1>
    <p>Manage and track latest packaging versions across bins</p>
  </div>

  <div class="controls">
    <button class="btn" onclick="loadDashboard()">↻ Refresh</button>
    <button class="btn btn-outline" onclick="navForm('dashboard')">← Dashboard</button>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <input type="text" id="searchInput" placeholder="Search PM items..." oninput="handleSearch(this.value)">
    </div>
  </div>

  <div class="filters">
    <div class="filter-opt">
      <label>Status Filter:</label>
      <select id="statusFilter" onchange="handleFilterChange()" class="btn btn-outline" style="padding: 6px 12px; font-size: 13px;">
        <option value="ALL">All Materials</option>
        <option value="LATEST">Latest Only</option>
        <option value="OBSOLETE">Obsolete Only</option>
      </select>
    </div>
    <div id="resultMeta" class="result-meta"></div>
  </div>

  <div id="grid" class="grid">
    <div class="loading">Loading dashboard...</div>
  </div>

  <!-- Modal -->
  <div id="modalOverlay" class="modal-overlay">
    <div class="modal">
      <h3 id="modalTitle">Assign Latest Version</h3>
      <label>Latest name:</label>
      <input type="text" id="latestName" placeholder="e.g., LB001" autocomplete="off">
      <label>Reason for marking as latest:</label>
      <textarea id="latestReason" placeholder="e.g., Label change, Regulatory update..."></textarea>
      <div class="modal-btns">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn" id="modalSaveBtn" onclick="saveLatestStatus()">Save Status</button>
      </div>
    </div>
  </div>

  <script>
    let allItems = [];
    let searchTimer = null;
    let currentPayload = null;
    const userRole = "<?!= userRole ?>";

    window.onload = function () {
      loadDashboard();
    };

    function loadDashboard() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '<div class="loading">Loading packing data...</div>';

      google.script.run
        .withSuccessHandler(function (payload) {
          allItems = payload || [];
          applyFilters();
        })
        .withFailureHandler(function (err) {
          grid.innerHTML = '<div class="loading" style="color:red">Error: ' + err.message + '</div>';
        })
        .getPackingMaterialDashboardData();
    }

    function handleSearch(val) {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => applyFilters(), 200);
    }

    function handleFilterChange() {
      applyFilters();
    }

    function applyFilters() {
      const q = document.getElementById('searchInput').value.trim().toUpperCase();
      const statusFilter = document.getElementById('statusFilter').value;

      let filtered = JSON.parse(JSON.stringify(allItems)); // Deep copy for filtering bins

      if (q) {
        filtered = filtered.filter(it => 
          it.itemCode.toUpperCase().includes(q) || 
          it.itemName.toUpperCase().includes(q) ||
          (it.versions || []).some(v => (v.bins || []).some(b => String(b.latestName || '').toUpperCase().includes(q)))
        );
      }

      // Filter Bins within items based on status
      filtered.forEach(it => {
        if (statusFilter === 'LATEST') {
          it.versions.forEach(v => {
            v.bins = v.bins.filter(b => b.isLatest);
          });
        } else if (statusFilter === 'OBSOLETE') {
          it.versions.forEach(v => {
            v.bins = v.bins.filter(b => !b.isLatest);
          });
        }
        // Remove empty versions/items for cleaner view
        it.versions = it.versions.filter(v => v.bins.length > 0);
      });

      filtered = filtered.filter(it => it.versions.length > 0);

      renderGrid(filtered, q, statusFilter !== 'ALL');
    }

    function renderGrid(items, highlight, forceOpen) {
      const grid = document.getElementById('grid');
      const meta = document.getElementById('resultMeta');
      grid.innerHTML = '';

      if (items.length === 0) {
        grid.innerHTML = '<div class="loading">No matching items found.</div>';
        meta.textContent = '';
        return;
      }

      meta.textContent = `Showing ${items.length} PM items matching filters`;

      items.forEach(it => {
        const card = document.createElement('details');
        card.className = 'item-card';
        if (highlight || forceOpen) card.setAttribute('open', '');

        const itemCodeHtml = highlight ? highlightText(it.itemCode, highlight) : esc(it.itemCode);
        const itemNameHtml = highlight ? highlightText(it.itemName, highlight) : esc(it.itemName);

        card.innerHTML = `
          <summary class="summary-row">
            <div class="summary-copy">
              <div>
                ${it.hasLatest ? '<span class="badge badge-latest">Active Lifecycle</span>' : '<span class="badge badge-obsolete">No Latest Set</span>'}
                <strong>${itemCodeHtml}</strong>
              </div>
              <span class="item-desc">${itemNameHtml}</span>
            </div>
            <span class="pill">${Number(it.totalQty || 0).toFixed(0)} ${esc(it.uomCode)}</span>
          </summary>
          <div class="bins"></div>
        `;

        const binContainer = card.querySelector('.bins');
        
        (it.versions || []).forEach(v => {
          (v.bins || []).forEach(b => {
            const binRow = document.createElement('div');
            const isObsolete = it.hasLatest && !b.isLatest;
            binRow.className = `bin-row ${b.isLatest ? 'is-latest' : ''}`;
            
            binRow.innerHTML = `
              <div class="bin-header">
                <div class="bin-info">
                  <span class="bin-code">
                    ${b.isLatest ? '<span class="badge badge-latest">LATEST</span>' : (isObsolete ? '<span class="badge badge-obsolete">OBSOLETE</span>' : '')}
                    ${esc(b.binCode)} | Version: ${esc(v.version)}
                  </span>
                  ${b.isLatest && b.latestName ? `<span class="bin-meta">Latest Name: ${esc(b.latestName)}</span>` : ''}
                  <span class="bin-meta">${esc(b.site)} - ${esc(b.location)} ${b.rackCode ? '| Rack: ' + esc(b.rackCode) : ''}</span>
                </div>
                <span class="bin-qty">${Number(b.quantity || 0).toFixed(0)}</span>
              </div>
              ${b.isLatest && b.latestReason ? `<div class="bin-reason">Reason: ${esc(b.latestReason)}</div>` : ''}
              ${userRole === 'MANAGER' ? `
                <div class="bin-actions">
                  <button class="btn btn-sm ${b.isLatest ? 'btn-outline' : ''}" onclick="openLatestModal('${it.itemCode}', '${v.version}', '${b.binId}', ${!b.isLatest})">
                    ${b.isLatest ? 'Unmark Latest' : 'Mark as Latest'}
                  </button>
                </div>
              ` : ''}
            `;
            binContainer.appendChild(binRow);
          });
        });

        grid.appendChild(card);
      });
    }

    function openLatestModal(itemCode, version, binId, targetStatus) {
      currentPayload = { itemCode, version, binId, isLatest: targetStatus };
      document.getElementById('modalTitle').textContent = targetStatus ? 'Mark as Latest' : 'Unmark Latest';
      document.getElementById('latestName').value = '';
      document.getElementById('latestName').disabled = !targetStatus;
      document.getElementById('latestReason').value = '';
      document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modalOverlay').style.display = 'none';
      currentPayload = null;
    }

    function saveLatestStatus() {
      if (!currentPayload) return;
      const latestName = document.getElementById('latestName').value.trim().toUpperCase();
      const reason = document.getElementById('latestReason').value.trim();
      if (currentPayload.isLatest && !latestName) {
        alert('Please provide a latest name, e.g. LB001.');
        return;
      }
      if (currentPayload.isLatest && !reason) {
        alert('Please provide a reason for marking as latest.');
        return;
      }

      currentPayload.latestName = latestName;
      currentPayload.reason = reason;
      
      const btn = document.getElementById('modalSaveBtn');
      btn.disabled = true;
      btn.textContent = 'Saving...';

      google.script.run
        .withSuccessHandler(function () {
          // FAST UPDATE: Update local state instead of reload
          updateLocalState(currentPayload);
          closeModal();
          btn.disabled = false;
          btn.textContent = 'Save Status';
          applyFilters();
        })
        .withFailureHandler(function (err) {
          alert('Failed to save: ' + err.message);
          btn.disabled = false;
          btn.textContent = 'Save Status';
        })
        .setPackingVersionLatest(currentPayload);
    }

    function updateLocalState(payload) {
      const it = allItems.find(x => x.itemCode.toUpperCase() === payload.itemCode.toUpperCase());
      if (!it) return;

      // Update the specific bin
      it.versions.forEach(v => {
        v.bins.forEach(b => {
          if (v.version.toUpperCase() === payload.version.toUpperCase() && b.binId.toUpperCase() === payload.binId.toUpperCase()) {
            b.isLatest = payload.isLatest;
            b.latestReason = payload.isLatest ? payload.reason : '';
            b.latestName = payload.isLatest ? payload.latestName : '';
          } else if (payload.isLatest) {
            // If we marked a new latest, unset all other latests for this item
            if (b.isLatest) {
              b.isLatest = false;
              b.latestReason = 'Superseded';
              b.latestName = '';
            }
          }
        });
      });

      // Recalculate it.hasLatest
      it.hasLatest = it.versions.some(v => v.bins.some(b => b.isLatest));
    }

    function highlightText(text, q) {
      const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
      return esc(text).replace(re, '<mark>$1</mark>');
    }

    function esc(s) {
      if (!s) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function navForm(formName) {
      google.script.run.withSuccessHandler(url => {
        window.top.location.href = url + '?form=' + formName;
      }).getScriptUrl();
    }
  </script>
</body>

</html>

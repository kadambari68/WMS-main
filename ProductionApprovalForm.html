<!DOCTYPE html>
<html lang="en">

<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Orders | WMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #F3F4F6;
            font-family: 'Inter', sans-serif;
            padding: 20px;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .pending-item {
            background: #FFF3CD;
            border: 1px solid #FFCA2C;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .btn-approve {
            background: #10B981;
            color: white;
            border: none;
        }

        .btn-reject {
            background: #EF4444;
            color: white;
            border: none;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .search-wrap {
            max-width: 420px;
        }
    </style>
</head>

<body>
    <div class="container" style="max-width: 1000px;">
        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0"><i class="fa-solid fa-clipboard-list text-info me-2"></i>Production Orders</h4>
                <button class="btn btn-sm btn-outline-secondary" onclick="goBack()">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div id="loading" class="text-center my-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">Loading production orders...</p>
            </div>

            <div id="searchBarWrap" class="search-wrap mb-3 d-none">
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
                    <input type="text" class="form-control" id="orderSearchInput"
                        placeholder="Search by PO no, item code, item name, or batch">
                </div>
            </div>

            <div id="ordersContainer" class="d-none"></div>
        </div>
    </div>

    <script>
        let screenToken = 0;
        let navInProgress = false;
        let allOrders = [];

        window.onload = function () {
            mountScreen();
        };

        window.onbeforeunload = function () {
            destroyScreen();
        };

        function mountScreen() {
            screenToken++;
            loadOrders(screenToken);
        }

        function destroyScreen() {
            screenToken++;
            const container = document.getElementById('ordersContainer');
            const loading = document.getElementById('loading');
            if (container) {
                container.innerHTML = '';
                container.classList.add('d-none');
            }
            if (loading) loading.classList.remove('d-none');
        }

        function loadOrders(token) {
            const loading = document.getElementById('loading');
            if (loading) loading.classList.remove('d-none');

            google.script.run
                .withSuccessHandler(function (orders) {
                    if (token !== screenToken) {
                        return;
                    }

                    const normalized = normalizeOrders(orders);
                    allOrders = normalized;
                    displayOrders(normalized);
                })
                .withFailureHandler(function (err) {
                    if (token !== screenToken) return;
                    alert('Error loading production orders: ' + (err ? err.message : 'Unknown error'));
                })
                .getPendingProductionOrders();
        }

        function normalizeOrders(payload) {
            if (Array.isArray(payload)) return payload;
            if (payload && Array.isArray(payload.orders)) return payload.orders;
            return [];
        }

        function displayOrders(orders) {
            document.getElementById('loading').classList.add('d-none');
            const container = document.getElementById('ordersContainer');
            const searchWrap = document.getElementById('searchBarWrap');
            container.classList.remove('d-none');
            if (searchWrap) searchWrap.classList.remove('d-none');

            const safeOrders = (Array.isArray(orders) ? orders : []).slice().sort(function (a, b) {
                return String(b.orderRef || '').localeCompare(String(a.orderRef || ''));
            });
            if (safeOrders.length === 0) {
                container.innerHTML = '<div class="alert alert-success"><strong>All Clear!</strong> No active production orders found.</div>';
                return;
            }

            let html = `<p class="text-muted mb-3">Found ${safeOrders.length} active production order line(s)</p>`;

            safeOrders.forEach((order, idx) => {
                const safeOrder = order || {};
                const status = String(safeOrder.status || 'OPEN').toUpperCase();
                const displayStatus = (status === 'OPEN' || status === 'APPROVED') ? 'READY' : status;
                const uom = String(safeOrder.uomCode || safeOrder.uom || 'KG');
                const itemName = String(safeOrder.itemName || '').trim();
                const batchLabel = String(safeOrder.batchNumber || safeOrder.batchId || 'TBD').trim() || 'TBD';
                const lastUpdated = safeOrder.lastUpdated ? toDateDisplay(safeOrder.lastUpdated) : '';

                let badgeClass = 'bg-secondary';
                if (displayStatus === 'READY') badgeClass = 'bg-success';
                else if (status === 'REJECTED') badgeClass = 'bg-danger';
                else if (status === 'OPEN') badgeClass = 'bg-warning';

                html += `
          <div class="pending-item" id="order-${safeOrder.orderRef || ''}-${idx}">
            <div class="row align-items-center">
              <div class="col-md-7">
                <strong>PO: ${safeOrder.orderRef || ''}</strong><br>
                <small class="text-muted">Item: ${safeOrder.itemCode || ''}</small><br>
                ${itemName ? `<small class="text-muted">${itemName}</small><br>` : ''}
                <span class="badge bg-secondary">${Number(safeOrder.quantity || 0)} ${uom}</span>
                <span class="badge ${badgeClass} ms-2">${displayStatus}</span>
                ${lastUpdated ? `<br><small class="text-muted mt-2">Updated: ${lastUpdated}</small>` : ''}
              </div>
              <div class="col-md-5 text-end">
                <small class="text-muted">Batch: ${batchLabel}</small>
              </div>
            </div>
          </div>
        `;
            });

            container.innerHTML = html;
        }

        function applyOrderSearch() {
            const input = document.getElementById('orderSearchInput');
            const query = String((input && input.value) || '').trim().toLowerCase();
            if (!query) {
                displayOrders(allOrders);
                return;
            }

            const filtered = (allOrders || []).filter(function (order) {
                const safeOrder = order || {};
                const haystack = [
                    safeOrder.orderRef,
                    safeOrder.itemCode,
                    safeOrder.itemName,
                    safeOrder.batchId,
                    safeOrder.batchNumber
                ].map(function (value) {
                    return String(value || '').trim().toLowerCase();
                }).join(' | ');
                return haystack.indexOf(query) >= 0;
            });

            displayOrders(filtered);
        }

        function toDateDisplay(value) {
            if (!value) return '';
            const d = new Date(value);
            if (isNaN(d.getTime())) return '';
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            const hh = String(d.getHours()).padStart(2, '0');
            const min = String(d.getMinutes()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd} ${hh}:${min}`;
        }

        function goBack() {
            if (navInProgress) return;
            navInProgress = true;
            destroyScreen();
            google.script.run.withSuccessHandler(url => {
                window.top.location.href = url + '?form=dashboard';
            }).getScriptUrl();
        }

        document.addEventListener('DOMContentLoaded', function () {
            const input = document.getElementById('orderSearchInput');
            if (!input) return;
            input.addEventListener('input', applyOrderSearch);
        });
    </script>
</body>

</html>
